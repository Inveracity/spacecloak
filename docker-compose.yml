services:
  spacetimedb:
    image: clockworklabs/spacetime:v2.1.0
    command: start --data-dir /stdb/data --jwt-pub-key-path /etc/spacetimedb/id_ecdsa.pub --jwt-priv-key-path /etc/spacetimedb/id_ecdsa
    user: "1002:1002"  # Avoid running as root, since the container writes to a mounted volume
    ports:
      - "3000:3000"   # WebSocket + HTTP API
    volumes:
      - ./spacetimedb-data:/stdb/data
      - ./spacetimedb-config:/home/spacetime
      - ./spacetimedb-keys:/etc/spacetimedb:ro
      - ./spacetime.json:/stdb/spacetime.json:ro
      - ./spacetime.local.json:/stdb/spacetime.local.json:ro
    # SpacetimeDB validates OIDC tokens automatically via the issuer's JWKS endpoint.
    # No extra config is needed here — just point your client at the Keycloak token endpoint.
    environment:
      RUST_BACKTRACE: "1"
      HOME: /home/spacetime
    # depends_on:
    #   keycloak:
    #     condition: service_healthy
    networks:
      - local-dev
  keycloak:
    image: keycloak/keycloak:26.6
    command: start-dev
    ports:
      - "8080:8080"   # Keycloak admin console & OIDC endpoints
    volumes:
      - ./keycloak.sh:/opt/keycloak/bin/keycloak.sh:ro
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_HOSTNAME: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - local-dev
  keycloak-db:
    image: postgres:18.3-alpine3.22
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - ./keycloakdb:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - local-dev

networks:
  local-dev:
    name: local-dev
